version: "3.8"

services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"

  mc-exporter:
    image: ghcr.io/minecraft-exporter/minecraft-exporter
    container_name: mc-exporter
    environment:
      - MC_SERVERS=server1.de:25565,server2.de:25565
    ports:
      - "9150:9150"
